version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: parkspot_db
    environment:
      POSTGRES_USER: parkspot
      POSTGRES_PASSWORD: parkspot123
      POSTGRES_DB: parkspot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parkspot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: parkspot_api
    environment:
      DATABASE_URL: postgresql://parkspot:parkspot123@postgres:5432/parkspot
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:
